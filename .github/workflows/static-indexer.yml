name: Publish static indexer

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: aurapredict-static-indexer
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Restore previous index state
        run: |
          mkdir -p indexer/data
          curl -fsSL "https://mrcocdilinh.github.io/AuraPredict/state/aurapredict-index.json" -o indexer/data/aurapredict-index.json || true

      - name: Sync Arc events
        timeout-minutes: 45
        env:
          # Active V5 deployment. loadState() rejects the restored V4 snapshot
          # above when its contractAddress does not match this address.
          AURA_INDEXER_CONTRACT_ADDRESS: "0xb3B74ee71a02a25eB668A6206ed3F74b3444611A"
          ARC_RPC_URL: ${{ secrets.ARC_RPC_URL }}
          AURA_INDEXER_RPC_URLS: ${{ secrets.AURA_INDEXER_RPC_URLS }}
          AURA_INDEXER_EVENT_RPC_URL: ${{ secrets.AURA_INDEXER_EVENT_RPC_URL }}
          AURA_INDEXER_START_BLOCK: "47380000"
          # Arc limits eth_getLogs to a 10,000-block range.
          AURA_INDEXER_CHUNK_SIZE: "9999"
          AURA_INDEXER_CHUNK_DELAY_MS: "1000"
          AURA_INDEXER_CHECKPOINT_CHUNKS: "5"
          AURA_INDEXER_POLL_MS: "60000"
          AURA_INDEXER_WS_ENABLED: "0"
          AURA_INDEXER_READ_RETRIES: "6"
          AURA_INDEXER_MARKET_READ_CONCURRENCY: "4"
          AURA_INDEXER_MARKET_READ_FAIL_SOFT: "1"
        run: npm run indexer:once

      - run: npm run indexer:export-static -- static-index

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: static-index

      - id: deployment
        uses: actions/deploy-pages@v4
