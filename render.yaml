services:
  - type: web
    name: aurapredict-indexer
    runtime: docker
    dockerfilePath: ./Dockerfile.indexer
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_PREDICTION_MARKET_ADDRESS
        value: 0x3c853AE2eC705B453c9657569b6335e762631536
      - key: AURA_INDEXER_START_BLOCK
        value: 44083985
      - key: AURA_INDEXER_CHUNK_SIZE
        value: 9000
      - key: AURA_INDEXER_POLL_MS
        value: 12000
